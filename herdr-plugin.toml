id = "beyondlex.herdr-recent-navigator"
name = "Herdr Recent Navigator"
version = "0.4.0"
description = "Recent workspaces, tabs, panes, and AI agents switcher for Herdr."
min_herdr_version = "0.7.4"
platforms = ["macos", "linux"]
theme = "dark"
# Milliseconds a cycle session stays alive after the last press. Presses
# within this window continue the session (popup from the second press);
# expiry commits the highlighted pane. GUI switchers (KDE/Firefox/macOS)
# commit on modifier release, which terminals can't see; tmux repeat-time
# (500) and wezterm/vim leader timeouts (1000) bracket this default.
cycle_timeout_ms = 2000
# Open the popup on the FIRST press (selection starts on the MRU-previous
# pane) so every subsequent press is a bare Tab inside the popup. The
# single-press toggle then commits on timeout or Enter instead of instantly.
cycle_popup_on_first = true
# Commit window while only the opening press has happened (the pending
# quick-toggle). Once a second press arrives, cycle_timeout_ms applies.
cycle_first_timeout_ms = 250

[[build]]
command = ["cargo", "build", "--release"]
platforms = ["macos", "linux"]

[[actions]]
id = "open"
title = "Open Navigator"
description = "Open the recent items navigator"
contexts = ["global", "workspace"]
command = ["./target/release/herdr-recent-navigator", "--pane-open"]

[[actions]]
id = "focus-workspaces"
title = "Quick Focus: Workspaces"
description = "Open navigator focused on Workspaces tab"
contexts = ["global", "workspace"]
command = ["./target/release/herdr-recent-navigator", "--pane-open", "--view", "workspaces"]

[[actions]]
id = "focus-tabs"
title = "Quick Focus: Tabs"
description = "Open navigator focused on Tabs tab"
contexts = ["global", "workspace"]
command = ["./target/release/herdr-recent-navigator", "--pane-open", "--view", "tabs"]

[[actions]]
id = "focus-agents"
title = "Quick Focus: Agents"
description = "Open navigator focused on Agents tab"
contexts = ["global", "workspace"]
command = ["./target/release/herdr-recent-navigator", "--pane-open", "--view", "agents"]

[[actions]]
id = "focus-panes"
title = "Quick Focus: Panes"
description = "Open navigator focused on Panes tab"
contexts = ["global", "workspace"]
command = ["./target/release/herdr-recent-navigator", "--pane-open", "--view", "panes"]

[[actions]]
id = "cycle-panes"
title = "Cycle Panes (MRU)"
description = "Focus the next pane in most-recently-used order; repeated presses within the timeout walk deeper (alt-tab style)"
contexts = ["global", "workspace"]
command = ["./target/release/herdr-recent-navigator", "cycle"]

[[actions]]
id = "cycle-panes-reverse"
title = "Cycle Panes Backward (MRU)"
description = "Step backward through the most-recently-used pane order"
contexts = ["global", "workspace"]
command = ["./target/release/herdr-recent-navigator", "cycle", "--reverse"]

[[events]]
on = "workspace.focused"
command = ["./target/release/herdr-recent-navigator", "track"]

[[events]]
on = "pane.focused"
command = ["./target/release/herdr-recent-navigator", "track"]

[[events]]
on = "tab.focused"
command = ["./target/release/herdr-recent-navigator", "track"]

[[panes]]
id = "navigator"
title = "Recent Navigator"
placement = "popup"
width = "60%"
command = ["./target/release/herdr-recent-navigator"]
